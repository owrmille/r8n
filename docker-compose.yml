x-tls-common-env: &tls-common-env
  SERVER_SSL_ENABLED: ${SERVER_SSL_ENABLED:?}
  SERVER_SSL_KEY_STORE_PASSWORD: ${TLS_KEYSTORE_PASSWORD:?}
  SERVER_SSL_KEY_STORE_TYPE: PKCS12
  SERVER_SSL_KEY_ALIAS: ${SERVER_SSL_KEY_ALIAS:?}

x-tls-client-common-env: &tls-client-common-env
  JAVA_TOOL_OPTIONS: >-
    -Djavax.net.ssl.trustStore=${SSL_TRUST_STORE:?}
    -Djavax.net.ssl.trustStorePassword=${TLS_TRUSTSTORE_PASSWORD:?}
    -Djavax.net.ssl.trustStoreType=PKCS12

x-jvm-service-healthcheck: &jvm-service-healthcheck
  test: ["CMD-SHELL", "bash -ec 'echo > /dev/tcp/localhost/8080'"]
  interval: 5s
  timeout: 3s
  retries: 20
  start_period: 10s

services:
  database:
    image: postgres:15
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?}
      POSTGRES_USER: ${DATABASE_USERNAME:?}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?}
    ports:
      - "${DATABASE_HOST_PORT:?}:${DATABASE_CONTAINER_PORT:?}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - r8n_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  opinions:
    build:
      context: ./deployment/opinions
      dockerfile: Dockerfile
    env_file:
      - ./deployment/config/docker.env
      - ./deployment/secrets/docker.secrets.env
    environment:
      <<: [*tls-common-env, *tls-client-common-env]
      SERVICE_NAME: opinions
      SERVER_SSL_KEY_STORE: /certs/keystore-opinions.p12
      SERVICES_OPINIONS_PORT: ${SERVICES_OPINIONS_PORT:?}
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:?}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    networks:
      - r8n_net
    volumes:
      - ./deployment/opinions/logs:/var/log/r8n
      - ./deployment/certs/internal:/certs:ro
    depends_on:
      database:
        condition: service_healthy
    healthcheck: *jvm-service-healthcheck

  mock:
    build:
      context: ./deployment/mock
      dockerfile: Dockerfile
    env_file:
      - ./deployment/config/docker.env
      - ./deployment/secrets/docker.secrets.env
    environment:
      <<: [*tls-common-env, *tls-client-common-env]
      SERVICE_NAME: mock
      SERVER_SSL_KEY_STORE: /certs/keystore-mock.p12
      SERVICES_MOCK_PORT: ${SERVICES_MOCK_PORT:?}
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:?}
    networks:
      - r8n_net
    volumes:
      - ./deployment/mock/logs:/var/log/r8n
      - ./deployment/certs:/certs:ro
      - ./deployment/certs/internal:/certs:ro
    healthcheck: *jvm-service-healthcheck

  messaging:
    build:
      context: ./deployment/messaging
      dockerfile: Dockerfile
    env_file:
      - ./deployment/config/docker.env
      - ./deployment/secrets/docker.secrets.env
    environment:
      <<: [*tls-common-env, *tls-client-common-env]
      SERVICE_NAME: messaging
      SERVER_SSL_KEY_STORE: /certs/keystore-messaging.p12
      SERVICES_MESSAGING_PORT: ${SERVICES_MESSAGING_PORT:?}
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:?}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    networks:
      - r8n_net
    volumes:
      - ./deployment/messaging/logs:/var/log/r8n
      - ./deployment/certs/internal:/certs:ro
    depends_on:
      database:
        condition: service_healthy
    healthcheck: *jvm-service-healthcheck

  users:
    build:
      context: ./deployment/users
      dockerfile: Dockerfile
    env_file:
      - ./deployment/config/docker.env
      - ./deployment/secrets/docker.secrets.env
    environment:
      <<: [*tls-common-env, *tls-client-common-env]
      SERVICE_NAME: users
      SERVER_SSL_KEY_STORE: /certs/keystore-users.p12
      SERVICES_USERS_PORT: ${SERVICES_USERS_PORT:?}
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:?}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    networks:
      - r8n_net
    volumes:
      - ./deployment/users/logs:/var/log/r8n
      - ./deployment/users/avatar-storage:/var/lib/r8n/uploads/avatars
      - ./deployment/certs/internal:/certs:ro
    depends_on:
      database:
        condition: service_healthy
    healthcheck: *jvm-service-healthcheck

  export:
    build:
      context: ./deployment/export
      dockerfile: Dockerfile
    env_file:
      - ./deployment/config/docker.env
      - ./deployment/secrets/docker.secrets.env
    environment:
      <<: [*tls-common-env, *tls-client-common-env]
      SERVICE_NAME: export
      SERVER_SSL_KEY_STORE: /certs/keystore-export.p12
      SERVICES_EXPORT_PORT: ${SERVICES_EXPORT_PORT:?}
      INTERSERVICE_PROTOCOL: ${INTERSERVICE_PROTOCOL:?}
      SERVICES_USERS_HOST: ${SERVICES_USERS_HOST:?}
      SERVICES_USERS_PORT: ${SERVICES_USERS_PORT:?}
      SERVICES_MOCK_HOST: ${SERVICES_MOCK_HOST:?}
      SERVICES_MOCK_PORT: ${SERVICES_MOCK_PORT:?}
      SERVICES_MESSAGING_HOST: ${SERVICES_MESSAGING_HOST:?}
      SERVICES_MESSAGING_PORT: ${SERVICES_MESSAGING_PORT:?}
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:?}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    networks:
      - r8n_net
    volumes:
      - ./deployment/export/logs:/var/log/r8n
      - ./deployment/certs/internal:/certs:ro
    depends_on:
      database:
        condition: service_healthy
      users:
        condition: service_healthy
      mock:
        condition: service_healthy
      messaging:
        condition: service_healthy
      opinions:
        condition: service_healthy
    healthcheck: *jvm-service-healthcheck

  gateway:
    build:
      context: ./deployment/gateway
      dockerfile: Dockerfile
    env_file:
      - ./deployment/config/docker.env
      - ./deployment/secrets/docker.secrets.env
    environment:
      <<: [*tls-common-env, *tls-client-common-env]
      SERVICE_NAME: gateway
      SERVER_SSL_KEY_STORE: /certs/keystore-gateway.p12
      GATEWAY_PORT: ${GATEWAY_CONTAINER_PORT:?}
      GATEWAY_HOST_PORT: ${GATEWAY_HOST_PORT:?}
      INTERSERVICE_PROTOCOL: ${INTERSERVICE_PROTOCOL:?}
      SERVICES_OPINIONS_HOST: ${SERVICES_OPINIONS_HOST:?}
      SERVICES_OPINIONS_PORT: ${SERVICES_OPINIONS_PORT:?}
      SERVICES_MOCK_HOST: ${SERVICES_MOCK_HOST:?}
      SERVICES_MOCK_PORT: ${SERVICES_MOCK_PORT:?}
      SERVICES_MESSAGING_HOST: ${SERVICES_MESSAGING_HOST:?}
      SERVICES_MESSAGING_PORT: ${SERVICES_MESSAGING_PORT:?}
      SERVICES_USERS_HOST: ${SERVICES_USERS_HOST:?}
      SERVICES_USERS_PORT: ${SERVICES_USERS_PORT:?}
      SERVICES_EXPORT_HOST: ${SERVICES_EXPORT_HOST:?}
      SERVICES_EXPORT_PORT: ${SERVICES_EXPORT_PORT:?}
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:?}
    ports:
      - "${GATEWAY_HOST_PORT:?}:${GATEWAY_CONTAINER_PORT:?}"
    depends_on:
      opinions:
        condition: service_healthy
      mock:
        condition: service_healthy
      messaging:
        condition: service_healthy
      users:
        condition: service_healthy
      export:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      - r8n_net
    volumes:
      - ./deployment/gateway/logs:/var/log/r8n
      - ./deployment/certs:/certs:ro
      - ./deployment/certs/internal:/certs:ro
    healthcheck: *jvm-service-healthcheck

  frontend:
    build:
      context: .
      dockerfile: deployment/frontend/Dockerfile
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_HOST_PORT:?}:80"
      - "${FRONTEND_HTTPS_HOST_PORT:?}:443"
    volumes:
      - ./deployment/certs/edge:/etc/nginx/certs:ro
      - ./deployment/certs/internal:/etc/nginx/certs-internal:ro
    networks:
      - r8n_net

networks:
  r8n_net:
    name: r8n_net
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./deployment/database/data
