<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>R8N</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="icon" type="image/x-icon" href="favicon.png"/>
</head>
<body>

<div class="topbar">
    <div class="nav">
        <div class="dropdown">
            <button class="dropdown-btn">
                Dashboard ▾
            </button>
            <div class="dropdown-menu">
                <div class="dropdown-item">Dashboard</div>
                <div class="dropdown-item">My ratings</div>
                <div class="dropdown-item">Access requests</div>
            </div>
        </div>
    </div>

    <button class="settings-btn">⚙️</button>
</div>


<h2>My Ratings
    <span class="api-hint" data-api="OpinionListApi::getMine">#</span>
</h2>
<div class="ratings-list">
    <div class="rating-card">
        <div class="rating-title">ivan_cappuccino</div>
        <div class="rating-meta">
            <span>Items: 3</span>
            <span>Searchable: yes</span>
            <span>Access: 0</span>
        </div>
    </div>

    <div class="rating-card private">
        <div class="rating-title">ivan_cappuccino_private</div>
        <div class="rating-meta">
            <span>Items: 5</span>
            <span>Searchable: no</span>
            <span>Access: 0</span>
        </div>
    </div>
</div>

<h2>Search Ratings
    <span class="api-hint" data-api="OpinionListApi::search">#</span>
</h2>
<div class="search-block">
    <div class="search-section">
        <input
                id="searchInput"
                type="text"
                placeholder="Search ratings (e.g. doner)"
                autocomplete="off"
        />
        <button id="searchBtn" class="btn">Search</button>
    </div>


    <div id="results" class="results"></div>
</div>
<div id="modal" class="modal">
    <div class="modal-content">
        <div id="modalText"></div>
        <div class="modal-actions">
            <button class="btn">Import as new rating</button>
            <button class="btn secondary">Attach to existing</button>
            <button id="cancelBtn" class="btn ghost">Cancel</button>
        </div>
    </div>
</div>
<footer class="footer">
    <a>Datenschutz</a> · <a>Legal notice</a> · <a>Terms</a>
</footer>
<script src="dashboard.js"></script>
</body>
</html>
