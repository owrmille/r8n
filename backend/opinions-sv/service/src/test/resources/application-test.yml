
spring:
  application.name: opinions-sv
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.sql
    default-schema: opinions
    contexts: test
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      initializationFailTimeout: 0
      minimumIdle: 0
      maximumPoolSize: 5
      idleTimeout: 100
      maxLifetime: 100
      validationTimeout: 250
      leakDetectionThreshold: 0
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.default_schema: opinions
  lifecycle:
    timeout-per-shutdown-phase: 1s