
spring:
  application.name: opinions-sv
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.sql
    contexts: test
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      minimumIdle: 0
      idleTimeout: 10000
      maxLifetime: 30000
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
  lifecycle:
    timeout-per-shutdown-phase: 1s