
spring:
  application.name: opinions-sv
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.sql
    contexts: test
  jpa:
    hibernate:
      ddl-auto: validate
  lifecycle:
    timeout-per-shutdown-phase: 1s
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      minimumIdle: 0
      idleTimeout: 10000
      maxLifetime: 30000