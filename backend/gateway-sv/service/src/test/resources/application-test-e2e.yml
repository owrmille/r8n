server:
  port: ${GATEWAY_PORT}
  ssl:
    enabled: ${SERVER_SSL_ENABLED}
    key-store: ${SERVER_SSL_KEY_STORE}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE}
    key-alias: ${SERVER_SSL_KEY_ALIAS}

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: block_internal
              uri: no-forward://internal
              predicates:
                - Path=/api/internal/**
            - id: auth
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_USERS_HOST}:${SERVICES_USERS_PORT}
              predicates:
                - Path=/api/auth/**
            - id: opinions
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_OPINIONS_HOST}:${SERVICES_OPINIONS_PORT}
              predicates:
                - Path=/api/access-requests/**,/api/opinion-lists/**,/api/opinions/**,/api/subjects/**,/api/referents/**
            - id: users
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_USERS_HOST}:${SERVICES_USERS_PORT}
              predicates:
                - Path=/api/users/**
            - id: export
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_EXPORT_HOST}:${SERVICES_EXPORT_PORT}
              predicates:
                - Path=/api/export/**
            - id: messaging
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_MESSAGING_HOST}:${SERVICES_MESSAGING_PORT}
              predicates:
                - Path=/api/messaging/**
            - id: mock
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_MOCK_HOST}:${SERVICES_MOCK_PORT}
              predicates:
                - Path=/api/selectors/**
            - id: public_subjects
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_OPINIONS_HOST}:${SERVICES_OPINIONS_PORT}
              predicates:
                - Path=/api/public/subjects,/api/public/subjects/**
              filters:
                - ApiKeyAuthenticationFilter
                - name: RateLimitingFilter
                  args:
                    limit: 100
                    durationSeconds: 60
                - RewritePath=/api/public/subjects/?(?<segment>.*), /api/subjects/$\{segment}
r8n:
  security:
    public-paths: /api/auth/**
    jwt:
      public-key: ${JWT_PUBLIC_KEY}
