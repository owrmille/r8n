server:
  port: 8080
  ssl:
    enabled: false





spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: block_internal
              uri: no-forward://internal
              predicates:
                - Path=/api/internal/**
              filters:
                - SetStatus=403
            - id: auth
              uri: http://localhost:8082
              predicates:
                - Path=/api/auth/**
            - id: opinions
              uri: http://localhost:8081
              predicates:
                - Path=/api/access-requests/**,/api/opinion-lists/**,/api/opinions/**,/api/subjects/**
            - id: users
              uri: http://localhost:8082
              predicates:
                - Path=/api/users/**
            - id: messaging
              uri: http://localhost:8083
              predicates:
                - Path=/api/messaging/**
            - id: mock
              uri: http://localhost:8090
              predicates:
                - Path=/api/selectors/**
