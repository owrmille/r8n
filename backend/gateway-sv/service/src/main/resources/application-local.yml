server:
  port: ${GATEWAY_PORT}

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: opinions
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_OPINIONS_HOST}:${SERVICES_OPINIONS_PORT}
              predicates:
                - Path=/opinions/**
            - id: auth
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_USERS_HOST}:${SERVICES_USERS_PORT}
              predicates:
                - Path=/auth/**
            - id: users
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_USERS_HOST}:${SERVICES_USERS_PORT}
              predicates:
                - Path=/users/**
            - id: export
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_EXPORT_HOST}:${SERVICES_EXPORT_PORT}
              predicates:
                - Path=/export/**
            - id: mock
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_MOCK_HOST}:${SERVICES_MOCK_PORT}
              predicates:
                - Path=/access-requests/**,/opinion-lists/**,/selectors/**