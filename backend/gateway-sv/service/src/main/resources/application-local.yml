server:
  port: ${GATEWAY_PORT}
  ssl:
    enabled: ${SERVER_SSL_ENABLED}





spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_USERS_HOST}:${SERVICES_USERS_PORT}
              predicates:
                - Path=/api/auth/**
            - id: opinions
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_OPINIONS_HOST}:${SERVICES_OPINIONS_PORT}
              predicates:
                - Path=/api/opinions/**
            - id: users
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_USERS_HOST}:${SERVICES_USERS_PORT}
              predicates:
                - Path=/api/users/**
            - id: mock
              uri: ${INTERSERVICE_PROTOCOL}://${SERVICES_MOCK_HOST}:${SERVICES_MOCK_PORT}
              predicates:
                - Path=/api/access-requests/**,/api/opinion-lists/**,/api/selectors/**
