spring:
  application.name: messaging-sv
  liquibase:
    enabled: true
    change-log: db/changelog/messaging/db.changelog-master.sql
    default-schema: messaging
    liquibase-schema: public
    contexts: test
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/messaging?currentSchema=messaging
