name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  backend-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run backend tests
        run: make test-github-backend
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4

  frontend-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend tests
        run: make test-github-frontend

  e2e-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
        working-directory: frontend

      - name: Start backend
        run: |
          export TLS_KEYSTORE_PASSWORD=password
          export TLS_TRUSTSTORE_PASSWORD=password
          export SPRING_PROFILES_ACTIVE=test-e2e
          make docker-up
          # Wait for gateway to be healthy
          timeout 300 bash -c 'until curl -sk https://localhost:8080/users/export -H "Authorization: Bearer stub-access-token-123" > /dev/null 2>&1; do sleep 5; done'

      - name: Run E2E tests
        run: make test-github-e2e

      - name: Show docker logs
        if: failure()
        run: docker compose --env-file deployment/config/docker.env --env-file deployment/secrets/docker.secrets.env -f docker-compose.yml logs --tail=100

      - name: Stop backend
        if: always()
        run: make docker-down